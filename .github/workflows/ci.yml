name: CI -- Industrial Sensor Kafka Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint Python Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install flake8 kafka-python psycopg2-binary

      - name: Lint producer
        run: flake8 producer/ --max-line-length=120

      - name: Lint consumer
        run: flake8 consumer/ --max-line-length=120

  integration-test:
    name: Integration Test (Kafka + PostgreSQL)
    runs-on: ubuntu-latest
    needs: lint

    services:
      zookeeper:
        image: confluentinc/cp-zookeeper:7.5.0
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
          ZOOKEEPER_TICK_TIME: 2000

      kafka:
        image: confluentinc/cp-kafka:7.5.0
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
        ports:
          - 9092:9092

      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: sensors
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install kafka-python psycopg2-binary

      - name: Wait for Kafka to be ready
        run: |
          echo 'Waiting for Kafka...'
          sleep 30

      - name: Run integration test
        run: python tests/test_pipeline.py